name: Build Flet Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Flet CLI
      run: |
        pip install flet

    - name: Build Android APK
      run: |
        flet build apk main.py

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: khouta-app-release
        path: build/apk/*.apk
